name: Docs

# `released` fires only for stable releases; prereleases get `prereleased`.
on:
  release:
    types: [released]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh run list \
            --workflow=build.yml \
            --commit "$(git rev-parse HEAD)" \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')
          gh run download "$run_id" --name build --dir .

      - name: Build demo
        run: |
          mkdir -p docs/demo
          cp demo/index.html docs/demo/
          cp dist/* docs/demo/
          cp test/fonts/noto/NotoSans-Regular.ttf docs/demo/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
