<meta charset="utf-8" />
<p>
  <a href="https://github.com/harfbuzz/harfbuzzjs">harfbuzzjs</a> demo. Supports
  font drag and drop.
</p>
<p><input type="text" value="abc" id="text" /></p>
<p><a id="svgResult" href="#" title="Click to download"></a></p>
<p>Result:</p>
<div id="shapeResult"></div>
<script type="module">
  import * as hb from "./index.mjs";

  var fontBlob;
  function updateResult() {
    var blob = new hb.Blob(fontBlob);
    var face = new hb.Face(blob, 0);
    var font = new hb.Font(face);
    font.setScale(1000, 1000); // Optional, if not given will be in font upem

    var buffer = new hb.Buffer();
    buffer.addText(text.value);
    // buffer.setDirection(hb.Direction.LTR); // optional as guessSegmentProperties also handles it
    buffer.guessSegmentProperties();
    hb.shape(font, buffer);
    var result = JSON.parse(
      buffer.serialize({
        font: font,
        format: hb.BufferSerializeFormat.JSON,
        flags: hb.BufferSerializeFlag.NO_GLYPH_NAMES,
      }),
    );

    // returns glyphs paths, totally optional
    var glyphs = {};
    result.forEach(function (x) {
      if (glyphs[x.g]) return;
      glyphs[x.g] = font.glyphToPath(x.g);
    });

    var ax = 0;
    var ay = 0;
    var paths = result
      .map(function (x) {
        var p = `<path transform="translate(${ax + x.dx} ${-(ay + x.dy)}) scale(1 -1)" d="${glyphs[x.g]}" />`;
        ax += x.ax;
        ay += x.ay;
        return p;
      })
      .join("");

    svgResult.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" height="128">${paths}</svg>`;
    // Tighten viewBox to the rendered path bounds.
    var svg = svgResult.querySelector("svg");
    var b = svg.getBBox();
    var pad = Math.round(Math.min(b.width / 10, b.height / 10));
    svg.setAttribute(
      "viewBox",
      `${b.x - pad} ${b.y - pad} ${b.width + 2 * pad} ${b.height + 2 * pad}`,
    );
    svgResult.download = text.value + ".svg";
    // revoke previous URL
    if (svgResult.href) URL.revokeObjectURL(svgResult.href);
    svgResult.href = URL.createObjectURL(
      new Blob([svgResult.innerHTML.replace(' height="128"', "")], {
        type: "text/plain",
      }),
    );

    shapeResult.innerText = JSON.stringify(result);
  }

  fetch("NotoSans-Regular.ttf")
    .then(function (res) {
      return res.arrayBuffer();
    })
    .then(function (blob) {
      fontBlob = new Uint8Array(blob);
      updateResult();
    });

  document.getElementById("text").addEventListener("keyup", function (e) {
    updateResult();
  });

  document.addEventListener(
    "dragover",
    function (e) {
      e.stopPropagation();
      e.preventDefault();
    },
    false,
  );
  document.addEventListener(
    "dragleave",
    function (e) {
      e.stopPropagation();
      e.preventDefault();
    },
    false,
  );
  document.addEventListener("drop", function (e) {
    e.stopPropagation();
    e.preventDefault();
    handleFontUpdate(e.dataTransfer.files[0]);
  });

  function handleFontUpdate(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.addEventListener("load", function () {
      fontBlob = new Uint8Array(reader.result);
      updateResult();
    });
    reader.readAsArrayBuffer(file);
  }
</script>
