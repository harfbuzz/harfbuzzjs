<script type="module">
  import * as hb from "../dist/index.mjs";

  fetch("../test/fonts/noto/NotoSans-Regular.ttf")
    .then((x) => x.arrayBuffer())
    .then((fontData) => {
      var blob = new hb.Blob(fontData);
      var face = new hb.Face(blob, 0);
      var font = new hb.Font(face);

      var buffer = new hb.Buffer();
      buffer.addText("abc");
      buffer.guessSegmentProperties();
      hb.shape(font, buffer);

      var result = buffer.getGlyphInfosAndPositions();
      var glyphs = {};
      result.forEach(function (x) {
        if (glyphs[x.codepoint]) return;
        glyphs[x.codepoint] = {
          name: font.glyphName(x.codepoint),
          path: font.glyphToPath(x.codepoint),
          json: font.glyphToJson(x.codepoint),
        };
      });

      document.body.innerText = JSON.stringify(
        { shape: result, glyphs: glyphs },
        undefined,
        2,
      );
      document.body.style.whiteSpace = "pre";
    });
</script>
