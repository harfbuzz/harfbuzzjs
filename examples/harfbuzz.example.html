<script type="module">
import harfbuzz from '../dist/index.mjs';
const hb = await harfbuzz;

fetch('../test/fonts/noto/NotoSans-Regular.ttf')
  .then(x => x.arrayBuffer())
  .then(fontData => {
    var blob = new hb.Blob(fontData);
    var face = new hb.Face(blob, 0);
    var font = new hb.Font(face);

    var buffer = new hb.Buffer();
    buffer.addText('abc');
    buffer.guessSegmentProperties();
    hb.shape(font, buffer);

    var result = buffer.json(font);
    var glyphs = {};
    result.forEach(function (x) {
      if (glyphs[x.g]) return;
      glyphs[x.g] = {
        name: font.glyphName(x.g),
        path: font.glyphToPath(x.g),
        json: font.glyphToJson(x.g)
      };
    });

    document.body.innerText = JSON.stringify({ shape: result, glyphs: glyphs }, undefined, 2);
    document.body.style.whiteSpace = 'pre';
  });
</script>
